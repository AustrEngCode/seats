name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      # --- Install API deps ahead of SWA to avoid broken symlinks during zipping ---
      - name: Install API deps and clean broken symlinks
        working-directory: api
        run: |
          npm ci --omit=dev
          find node_modules -type l -xtype l -delete || true

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload

          # FRONTEND is in repo root
          app_location: "/"
          output_location: ""
          skip_app_build: true

          # API is in /api (deps installed above; avoid rebuilding)
          api_location: "api"
          skip_api_build: true
