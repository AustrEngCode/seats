<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seating Planner · Admin</title>
  <link rel="stylesheet" href="/assets/css/theme.css" />
</head>

<body>
  <div class="container">
    <header class="top">
      <div class="brand"><div class="logo"></div><h1>Admin</h1></div>
      <a class="btn ghost" href="/">Home</a>
    </header>

    <!-- LOGIN CARD -->
    <div class="card" id="loginCard">
      <h2>Admin Sign‑in</h2>
      <div class="row">
        <input id="adminKey" type="password" class="input" placeholder="Enter admin password" />
        <button class="btn" id="loginBtn">Sign in</button>
      </div>
      <div id="loginMsg" class="small"></div>
    </div>

    <!-- ADMIN AREA -->
    <div id="adminArea" style="display:none">

      <!-- ROSTER CARD -->
      <div class="card">
        <h2>Roster</h2>
        <div class="small">Paste one student per line. You can include your five test students (29‑XY … 33‑XY) or click the button below.</div>

        <textarea id="roster-textarea" rows="8" class="input"
          placeholder="Beate&#10;Amel&#10;Tobias ..."></textarea>

        <div id="roster-info" class="small" style="margin-top:.25rem;"></div>

        <div class="row" style="margin-top:.5rem">
          <button class="btn" id="btnAddTest">Add 29‑XY … 33‑XY</button>
          <button class="btn secondary" id="btnSaveRoster">Save Roster</button>
          <button class="btn ghost" id="btnRefreshRoster">Refresh</button>
        </div>
      </div>

      <!-- TOKENS CARD -->
      <div class="card">
        <h2>Tokens</h2>
        <div class="row">
          <button class="btn" id="btnGenTokens">Generate/Regenerate Tokens</button>
          <button class="btn secondary" id="btnExportLinks">Export Links (CSV)</button>
        </div>
        <div id="tokensMsg" class="small"></div>
      </div>

      <!-- STATUS CARD -->
      <div class="card">
        <h2>Status</h2>
        <div class="row">
          <button class="btn ghost" id="btnRefreshStatus">Refresh</button>
          <button class="btn" id="btnSolve">Run Solver</button>
        </div>
        <div id="statusArea" class="small"></div>
      </div>

    </div>

    <footer><span class="badge">Admin is protected with an app setting (x-admin-key).</span></footer>
  </div>


  <!-- MAIN ADMIN SCRIPT -->
  <script type="module">
    import { api, createEl } from '/assets/js/common.js';

    const loginCard = document.getElementById('loginCard');
    const adminArea = document.getElementById('adminArea');

    function getKey(){ return localStorage.getItem('ADMIN_KEY') || '' }
    function setKey(v){ localStorage.setItem('ADMIN_KEY', v) }

    async function call(path, opts={}){
      const headers = Object.assign({}, (opts.headers||{}), {'x-admin-key': getKey()});
      return api(path, Object.assign({}, opts, { headers }));
    }

    // ---- LOGIN ----
    document.getElementById('loginBtn').addEventListener('click', async ()=>{
      const k = document.getElementById('adminKey').value;
      if(!k){ document.getElementById('loginMsg').textContent='Enter a password.'; return; }
      setKey(k);
      try{
        await call('/status');
        loginCard.style.display='none';
        adminArea.style.display='block';
        loadRoster();   // AUTO‑LOAD ROSTER HERE
      }catch(err){
        document.getElementById('loginMsg').textContent='Invalid password or server unavailable.';
      }
    });

    // ---- ROSTER FUNCTIONS ----
    function getTA(){ return document.getElementById('roster-textarea'); }
    function setRosterInfo(msg){ document.getElementById('roster-info').textContent = msg || ''; }

    async function loadRoster(){
      try{
        const res = await call('/status');
        if(!res.ok) throw new Error('Failed to load roster');
        const names = res.students.map(s=>s.name);
        const ta = getTA(); if(ta) ta.value = names.join('\n');
        setRosterInfo(`Saved roster: ${names.length} students`);
      }catch(e){ setRosterInfo('Could not load roster from storage.') }
    }

    document.getElementById('btnAddTest').addEventListener('click', ()=>{
      const ta = getTA(); if(!ta) return;
      const existing = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
      const tests = ['29-XY','30-XY','31-XY','32-XY','33-XY'];
      const merged = [...new Set([...existing, ...tests])];
      ta.value = merged.join('\n');
    });

    document.getElementById('btnSaveRoster').addEventListener('click', async ()=>{
      const ta = getTA(); if(!ta) return;
      const students = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);

      try{
        const res = await call('/generateTokens', {
          method:'POST',
          body:{ mode:'saveRoster', students }
        });
        if(!res.ok) throw new Error();
        setRosterInfo(`Saved ${res.count} students.`);
        loadRoster(); // refresh
      }catch(e){
        setRosterInfo('Failed to save roster.');
      }
    });

    document.getElementById('btnRefreshRoster').addEventListener('click', loadRoster);


    // ---- TOKENS ----
    document.getElementById('btnGenTokens').addEventListener('click', async ()=>{
      try{
        const res = await call('/generateTokens', {method:'POST', body:{ mode:'generate' }});
        document.getElementById('tokensMsg').textContent = `Generated ${res.count} tokens.`;
      }catch(err){ document.getElementById('tokensMsg').textContent='Token generation failed.'; }
    });

    document.getElementById('btnExportLinks').addEventListener('click', async()=>{
      try{
        const res = await call('/generateTokens', {method:'POST', body:{ mode:'export' }});
        const rows = [['Name','Link'], ...res.links.map(l=>[l.name,l.url])];
        const csv = rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
        a.download='survey-links.csv'; a.click();
      }catch(err){ document.getElementById('tokensMsg').textContent='Export failed.'; }
    });


    // ---- STATUS ----
    document.getElementById('btnRefreshStatus').addEventListener('click', async ()=>{
      try{
        const res = await call('/status');
        const div = document.getElementById('statusArea');
        div.innerHTML='';
        div.appendChild(createEl('p',{text:`Submissions: ${res.submitted}/${res.total}`}));
        if(res.students){
          const ul=createEl('ul');
          res.students.forEach(s=>{
            ul.appendChild(createEl('li',{text:`${s.name} — ${s.submitted?'Submitted':'Pending'}`}));
          });
          div.appendChild(ul);
        }
      }catch(err){ document.getElementById('statusArea').textContent='Cannot fetch status.'; }
    });

  </script>

</body>
</html>
